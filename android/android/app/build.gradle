plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def versionProperties = new Properties()
def versionPropertiesFile = rootProject.file('version.properties')
if (versionPropertiesFile.exists()) {
    versionPropertiesFile.withReader('UTF-8') { reader ->
        versionProperties.load(reader)
    }
}

def flutterVersionCode = versionProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = versionProperties.getProperty('flutter.versionName') ?: '1.0'

android {
    namespace "com.stardewsync"
    compileSdk 36

    defaultConfig {
        applicationId "com.stardewsync"
        minSdk 30          // Android 11+ required for SAF on Android/data
        targetSdk 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:2.1.0"
    // DocumentFile SAF support
    implementation "androidx.documentfile:documentfile:1.0.1"
}
